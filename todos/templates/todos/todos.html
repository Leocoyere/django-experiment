{% extends "todos/base.html" %}

{% block title %}
    Todos
{% endblock %}

{% block content %}
    <h1>Todos</h1>
    <ul>
        {% for todo in todos %}
            <li><b>{{ todo.id }} - {{ todo.title }}</b> (Done: {{ todo.done }}) (Owned by: {{todo.owner.name}})</li>
        {% endfor %}
    </ul>

    <form method="post">
        {% csrf_token %}
        {{ form }}
        <button type="submit">Add Todo</button>
    </form>
{% endblock %}
